<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<title>危险品表格分析</title>
		<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 20px;
				background: #f9f9f9;
			}

			input,
			button {
				margin: 5px;
				padding: 5px;
			}

			table {
				border-collapse: collapse;
				margin-top: 20px;
				width: 100%;
				background: #fff;
				box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
			}

			th,
			td {
				border: 1px solid #ccc;
				padding: 8px;
				text-align: center;
				min-width: 50px;
				max-width: 300px;
				word-wrap: break-word;
				word-break: break-word;
			}

			th {
				background: #f0f0f0;
			}

			.copy-btn {
				cursor: pointer;
				padding: 2px 6px;
				margin-top: 4px;
				background: #4CAF50;
				color: white;
				border: none;
				border-radius: 4px;
				white-space: nowrap;
			}



			.btn-row {
				display: flex;
				align-items: center;
				justify-content: center;
				margin-top: 4px;
			}

			.copy-btn:hover {
				background: #45a049;
			}

			.copy-btn.state-solid {
				background-color: #808080;
			}

			.copy-btn.state-liquid {
				background-color: #87CEFA;
			}

			.copy-btn.state-isolate {
				background-color: #FFD700;
				color: black;
			}

			.copy-btn:disabled {
				opacity: 1;
				cursor: default;
			}

			.data-cell {
				display: flex;
				flex-direction: column;
				align-items: center;
				white-space: normal;
			}

			.packing-btn {
				padding: 5px 12px;
				margin-right: 5px;
				border: 1px solid #ccc;
				border-radius: 4px;
				cursor: pointer;
			}

			.packing-btn.selected {
				background: #4CAF50;
				color: white;
			}
			.note-item{
			    flex: none;
			
			    display: inline-flex;
			    align-items: center;
			    justify-content: center;
			
			    height: 36px;
			    padding: 0 14px;
			    box-sizing: border-box;
			
			    background: #f8fbff;
			    border-left: 4px solid #409EFF;
			    border-radius: 6px;
			
			    white-space: nowrap;
			
			    font-size: 14px;
			    line-height: 1;
			    font-family: "Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif;
			}

			@keyframes flashCell {
				0% {
					background-color: yellow;
				}

				50% {
					background-color: white;
				}

				100% {
					background-color: yellow;
				}
			}

			.flash-cell {
				animation: flashCell 0.5s ease-in-out;
			}

			.separator {
				border: 2px solid #FF6600;
				margin: 10px 0;
				background-color: antiquewhite;
			}

			.red-volume {
				color: white;
				background-color: red;
				padding: 0 4px;
				border-radius: 2px;
				display: inline-block;
				margin-left: 5px;
			}
		</style>
	</head>
	<body>


		<div id="packageCalculatorWrapper">
			<div class="package-calculator"></div>
			<div class="package-calculator"></div>
			<div class="package-calculator"></div>
			<div class="package-calculator"></div>
			<div class="package-calculator"></div>
		</div>
		<div id="noteContainer"></div>
		<input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
		<br>

		<label>Un No.: <input type="text" id="unNo"></label>

		<!-- 总体积和货物重量输入框 -->
		<div id="cargoContainer" style="margin-top:10px; display:contents; align-items:center;">
		</div>
		<div style="margin-top:5px; display: contents;">
			<button id="addCargo">+</button>
			<button id="removeCargo">-</button>
		</div>

		<script>
			let instanceCounter = 0;

			function createPackageCalculator(container) {
				instanceCounter++;
				const prefix = 'pc' + instanceCounter + '-';

				container.innerHTML = `
		        <style>
		            /* 卡片样式 */
		            .package-calculator {
		                font-family: Arial, sans-serif;
		                padding: 10px;
		                background-color: #f4f4f4;
		                border-radius: 8px;
						
		                max-width: 500px;
		                margin: 10px;
		                position: relative;
						display: inline-block;
		            }
		            .package-calculator .section {
		                margin-bottom: 10px;
		                padding: 10px;
		                background-color: #fff;
		                border-radius: 8px;
		            }
		            .package-calculator .inline-group {
		                display: flex;
		                flex-wrap: wrap;
		                gap: 5px;
		                margin-bottom: 10px;
						font:initial;
		            }
		            .package-calculator .inline-group label {
		                cursor: pointer;
		                padding: 5px 10px;
		                border: 1px solid #ccc;
		                border-radius: 5px;
		            }
		            .package-calculator .inline-group input[type="radio"] {
		                display: none;
		            }
		            .package-calculator .inline-group input[type="radio"]:checked + label {
		                background-color: #007bff;
		                color: white;
		                border-color: #007bff;
		            }
		            .package-calculator .input-row {
		                display: flex;
		                flex-wrap: wrap;
		                align-items: center;
		                gap: 10px;
		                margin-bottom: 10px;
		            }
		            .package-calculator input[type="number"] {
		                width: 60px;
		                padding: 3px;
		                -moz-appearance: textfield; /* Firefox 去掉箭头 */
		            }
		            /* Chrome, Edge, Safari 去掉箭头 */
		            .package-calculator input[type="number"]::-webkit-outer-spin-button,
		            .package-calculator input[type="number"]::-webkit-inner-spin-button {
		                -webkit-appearance: none;
		                margin: 0;
		            }
		            .package-calculator .result {
		                font-weight: bold;
		                font-size: 12px;
		                color: #d9534f;
		                margin-left: 10px;
		            
		                max-width: 180px;      /* 限制宽度 */
		                word-break: break-word;
		                white-space: normal;
		            
		                line-height: 1.4;
		            
		                display: flex;
		                flex-direction: column;
		            }
		            .package-calculator .reset-btn {
		                position: absolute;
		                bottom: 10px;
		                right: 10px;
		                padding: 5px 10px;
		                background-color: #dc3545;
		                color: white;
		                border: none;
		                border-radius: 5px;
		                cursor: pointer;
		            }
		            @media (max-width: 480px) {
		                .package-calculator {
		                    max-width: 100%;
		                }
		                .package-calculator .input-row {
		                    flex-direction: column;
		                    align-items: flex-start;
		                }
		            }
		        </style>
		
		        <div class="section inline-group">
		            <input type="radio" id="${prefix}status-solid" name="${prefix}status" value="固">
		            <label for="${prefix}status-solid">固</label>
		            <input type="radio" id="${prefix}status-liquid" name="${prefix}status" value="液">
		            <label for="${prefix}status-liquid">液</label>
		
		            <input type="radio" id="${prefix}unit-bags" name="${prefix}unit" value="BAGS">
		            <label for="${prefix}unit-bags">BAGS</label>
		            <input type="radio" id="${prefix}unit-cartons" name="${prefix}unit" value="CARTONS">
		            <label for="${prefix}unit-cartons">CARTONS</label>
		            <input type="radio" id="${prefix}unit-drums" name="${prefix}unit" value="DRUMS">
		            <label for="${prefix}unit-drums">DRUMS</label>
		        </div>
		
		        <div class="section">
		            <div class="input-row">
		                <label>总数量:</label>
		                <input type="number" class="quantity" min="1" step="1">
		                <div class="result"></div>
		            </div>
		            <div class="input-row">
		                <label>总毛重:</label>
		                <input type="number" class="totalWeight" min="0" step="0.01">
		                <label>单毛重:</label>
		                <input type="number" class="singleWeight" min="0" step="0.01">
		            </div>
		            <div class="input-row">
		                <label>总净重:</label>
		                <input type="number" class="totalNet" min="0" step="0.01">
		                <label>单净重:</label>
		                <input type="number" class="singleNet" min="0" step="0.01">
		            </div>
		        </div>
		
		        <button class="reset-btn">重置</button>
		        `;

				let isUpdating = false;
				let allData = [];

				function createTagButton(text, className) {

					const btn = document.createElement('button');

					btn.className = `copy-btn ${className}`;

					btn.innerText = text;

					btn.disabled = true;

					return btn;
				}

				function updateWeightsAndCode(changedEl) {
					if (isUpdating) return;
					isUpdating = true;

					const status = container.querySelector(`input[name="${prefix}status"]:checked`)?.value;
					const unit = container.querySelector(`input[name="${prefix}unit"]:checked`)?.value;
					const quantity = parseFloat(container.querySelector('.quantity').value);

					let totalWeight = parseFloat(container.querySelector('.totalWeight').value);
					let singleWeight = parseFloat(container.querySelector('.singleWeight').value);
					let totalNet = parseFloat(container.querySelector('.totalNet').value);
					let singleNet = parseFloat(container.querySelector('.singleNet').value);

					if (!isNaN(quantity) && quantity > 0) {
						if (changedEl === container.querySelector('.totalWeight') || changedEl === container
							.querySelector('.quantity')) {
							if (!isNaN(totalWeight)) singleWeight = totalWeight / quantity;
							container.querySelector('.singleWeight').value = isNaN(singleWeight) ? '' : singleWeight
								.toFixed(2);
						} else if (changedEl === container.querySelector('.singleWeight')) {
							if (!isNaN(singleWeight)) totalWeight = singleWeight * quantity;
							container.querySelector('.totalWeight').value = isNaN(totalWeight) ? '' : totalWeight
								.toFixed(2);
						}

						if (changedEl === container.querySelector('.totalNet') || changedEl === container.querySelector(
								'.quantity')) {
							if (!isNaN(totalNet)) singleNet = totalNet / quantity;
							container.querySelector('.singleNet').value = isNaN(singleNet) ? '' : singleNet.toFixed(2);
						} else if (changedEl === container.querySelector('.singleNet')) {
							if (!isNaN(singleNet)) totalNet = singleNet * quantity;
							container.querySelector('.totalNet').value = isNaN(totalNet) ? '' : totalNet.toFixed(2);
						}
					}

					let codes = [];

					if (unit && status && !isNaN(singleWeight)) {

						// BAGS
						if (unit === 'BAGS' && status === '固' && singleWeight >= 10 && singleWeight <= 30) {
							codes.push('5H3-塑料编织袋');
							codes.push('5M2-纸塑复合袋');
						}

						if (unit === 'BAGS' && status === '固' && singleWeight >= 100 && singleWeight <= 1500) {
							codes.push('13H4/13H3/13H2-集装袋');
						}

						// CARTONS
						if (
							unit === 'CARTONS' &&
							(status === '固' || status === '液') &&
							singleWeight <= 40
						) {
							codes.push('4G-纸箱');
						}

						// DRUMS
						if (
							unit === 'DRUMS' &&
							status === '固' &&
							singleWeight <= 56
						) {
							codes.push('1G-纸板桶');
						}

						if (
							unit === 'DRUMS' &&
							(status === '固' || status === '液') &&
							singleWeight >= 100 &&
							singleWeight <= 300
						) {
							codes.push('1A1-闭口钢桶 200L/DRUM');
							codes.push('1H1-闭口塑料桶 200L/DRUM');
						}

						if (
							unit === 'DRUMS' &&
							status === '液' &&
							singleWeight >= 14 &&
							singleWeight <= 38
						) {
							codes.push('3H1-小桶 20L/DRUM');
						}

						if (
							unit === 'DRUMS' &&
							(status === '固' || status === '液') &&
							singleWeight >= 20 &&
							singleWeight <= 100
						) {
							codes.push('1A2-开口钢铜 200L/DRUM');
						}

						if (
							unit === 'DRUMS' &&
							(status === '固' || status === '液') &&
							singleWeight >= 100 &&
							singleWeight <= 1500
						) {
							codes.push('31HA1-船级社 1000L/DRUM');
						}
					}

					const result = codes.length ? [...new Set(codes)].join('\n') :
						'无匹配包装代码';

					container.querySelector('.result').innerHTML =
						result.replace(/\n/g, '<br>');

					// 总净重联动货物重量
					if (
						changedEl === container.querySelector('.totalNet') ||
						changedEl === container.querySelector('.singleNet') ||
						changedEl === container.querySelector('.quantity')
					) {

						const cardIndex = Array.from(
							document.querySelectorAll('.package-calculator')
						).indexOf(container);

						const cargoInputs = document.querySelectorAll('.cargoWeight');

						if (cargoInputs[cardIndex]) {

							cargoInputs[cardIndex].value =
								isNaN(totalNet) ? '' : totalNet.toFixed(2);

							// 重新触发体积计算
							cargoInputs[cardIndex].dispatchEvent(
								new Event('input')
							);
						}
					}

					isUpdating = false;
				}

				container.querySelectorAll('.quantity, .totalWeight, .singleWeight, .totalNet, .singleNet').forEach(
					el => {
						el.addEventListener('input', () => updateWeightsAndCode(el));
					});

				container.querySelectorAll(`input[name="${prefix}unit"], input[name="${prefix}status"]`).forEach(el => {
					el.addEventListener('change', () => updateWeightsAndCode(null));
				});

				// 重置按钮
				container.querySelector('.reset-btn').addEventListener('click', () => {

					// 清空卡片输入
					container.querySelectorAll('input[type="number"]')
						.forEach(input => input.value = '');

					container.querySelectorAll(
						`input[name="${prefix}status"], input[name="${prefix}unit"]`
					).forEach(input => input.checked = false);

					container.querySelector('.result').textContent = '';

					// ===== 新增：同步清空货物重量 =====

					const cardIndex = Array.from(
						document.querySelectorAll('.package-calculator')
					).indexOf(container);

					const cargoInputs = document.querySelectorAll('.cargoWeight');

					if (cargoInputs[cardIndex]) {

						cargoInputs[cardIndex].value = '';

						// 触发重新计算体积
						cargoInputs[cardIndex].dispatchEvent(
							new Event('input')
						);
					}
				});
			}

			document.querySelectorAll('.package-calculator').forEach(container => {
				createPackageCalculator(container);
			});
		</script>

		<table id="resultTable">
			<thead id="tableHead"></thead>
			<tbody id="tableBody"></tbody>
		</table>

		<script>
			let allData = [];
			let searchHistory = [];
			let noteData = [];
			// 手动上传 Excel
			function handleFile(e) {

				const file = e.target.files[0];

				if (!file) return;

				const reader = new FileReader();

				reader.onload = function(event) {

					const data =
						new Uint8Array(
							event.target.result
						);

					const workbook =
						XLSX.read(data, {
							type: 'array'
						});

					const firstSheet =
						workbook.Sheets[
							workbook.SheetNames[0]
						];

					allData =
						XLSX.utils.sheet_to_json(
							firstSheet, {
								defval: ""
							}
						).map(row => ({
							...row,
							"Un No.": String(row["Un No."]).trim().padStart(4, '0')
						}));

					renderTableHead();

					alert(
						"Excel 文件加载成功，共 " +
						allData.length +
						" 行数据。"
					);
				};

				reader.readAsArrayBuffer(file);
			}


			// 自动读取同目录 Excel
			async function tryLoadExcel() {

				try {

					const response =
						await fetch(
							'./2020   危险品 表格.xls'
						);

					const arrayBuffer =
						await response.arrayBuffer();

					// 文件不存在
					if (
						!arrayBuffer ||
						arrayBuffer.byteLength < 100
					) {

						throw new Error(
							'文件不存在'
						);
					}

					const workbook =
						XLSX.read(
							arrayBuffer, {
								type: 'array'
							}
						);

					const firstSheet =
						workbook.Sheets[
							workbook.SheetNames[0]
						];

					allData =
						XLSX.utils.sheet_to_json(
							firstSheet, {
								defval: ""
							}
						).map(row => ({
							...row,
							"Un No.": String(row["Un No."]).trim().padStart(4, '0')
						}));

					// 没有数据
					if (
						!allData ||
						allData.length === 0
					) {

						throw new Error(
							'Excel为空'
						);
					}

					renderTableHead();

					console.log(
						'已自动加载 Excel'
					);

				} catch (e) {

					console.log(
						'未找到 Excel，启用手动上传'
					);

					const fileInput =
						document.getElementById(
							'fileInput'
						);

					fileInput.style.display =
						'inline-block';

					fileInput.addEventListener(
						'change',
						handleFile,
						false
					);
				}
			}


			// 页面启动
			tryLoadExcel();



			// 渲染表头
			function renderTableHead() {
				const tableHead = document.getElementById('tableHead');
				tableHead.innerHTML = "";
				if (allData.length === 0) return;
				const tr = document.createElement('tr');
				const keys = Object.keys(allData[0]);
				keys.forEach(key => {
					const th = document.createElement('th');
					th.innerText = key;
					tr.appendChild(th);
				});
				tableHead.appendChild(tr);
			}

			// 查询数据
			function searchData() {

				const unInput = document.getElementById('unNo');

				const unNo = unInput.value
					.trim()
					.padStart(4, '0');

				if (!unNo) return;

				const results = allData.filter(row =>
					row["Un No."] === unNo
				);

				// 查询失败
				if (results.length === 0) {

					const unInput = document.getElementById('unNo');

					unInput.style.backgroundColor = '#ff4040';

					setTimeout(() => {

						unInput.style.backgroundColor = '';

						unInput.value = '';

						unInput.focus();

					}, 800);

					return;
				}

				searchHistory.unshift(results.map(r => ({
					...r
				})));

				if (searchHistory.length > 5) {
					searchHistory.pop();
				}

				renderResults();

				unInput.value = '';

				unInput.focus();
			}

			// 渲染所有搜索结果（历史+当前）
			function renderResults() {
				const tbody = document.getElementById('tableBody');
				tbody.innerHTML = "";

				searchHistory.forEach((resultSet, index) => {
					if (index > 0) {
						const sepRow = document.createElement('tr');
						const sepTd = document.createElement('td');
						sepTd.colSpan = Object.keys(resultSet[0]).length;
						sepTd.className = "separator";
						sepRow.appendChild(sepTd);
						tbody.appendChild(sepRow);
					}

					resultSet.forEach(row => {
						const tr = document.createElement('tr');
						const keys = Object.keys(row);
						keys.forEach((key, idx) => {
							const val = row[key];
							const td = document.createElement('td');
							const div = document.createElement('div');
							div.className = 'data-cell';
							div.style.display = 'flex';
							div.style.justifyContent = 'center';
							div.style.alignItems = 'center';
							const span = document.createElement('span');
							span.innerText = val;
							div.appendChild(span);

							if (val !== null && val.trim() !== "" && idx !== keys.length - 1) {

								const btn = document.createElement('button');
								btn.className = 'copy-btn';
								btn.innerText = '复制';

								btn.onclick = () => {
									navigator.clipboard.writeText(val).then(() => {
										td.classList.add('flash-cell');
										setTimeout(() => td.classList.remove('flash-cell'),
											500);
									});
								};

								const btnRow = document.createElement('div');
								btnRow.className = 'btn-row';

								btnRow.appendChild(btn);

								// Proper Shipping Name 显示状态标签
								if (key === "Proper Shipping Name") {

									const tags = [];

									const upperVal = String(val).toUpperCase();

									// 固体/液体判断
									if (upperVal.includes('SOLID')) {

										tags.push({
											text: '固体',
											className: 'state-solid'
										});

									} else if (upperVal.includes('LIQUID')) {

										tags.push({
											text: '液体',
											className: 'state-liquid'
										});

									} else {

										const limitedQty =
											String(row["Limited Quantities"] || '')
											.toUpperCase()
											.replace(/\s/g, '');

										if (
											limitedQty.includes('ML') ||
											limitedQty.endsWith('L')
										) {

											tags.push({
												text: '液体',
												className: 'state-liquid'
											});

										} else if (
											limitedQty.includes('KG') ||
											limitedQty.endsWith('G')
										) {

											tags.push({
												text: '固体',
												className: 'state-solid'
											});
										}
									}

									// 隔离判断
									if (
										String(row["Class"] || '').trim() === '8'
									) {

										tags.push({
											text: '隔离，不能用【1A1】等金属包装',
											className: 'state-isolate'
										});
									}

									// 统一生成按钮
									tags.forEach(tagInfo => {

										const tagBtn = document.createElement('button');

										tagBtn.className =
											`copy-btn ${tagInfo.className}`;

										tagBtn.innerText =
											tagInfo.text;

										tagBtn.disabled = true;

										btnRow.appendChild(tagBtn);
									});
								}

								div.appendChild(btnRow);
							}

							td.appendChild(div);
							tr.appendChild(td);
						});
						tbody.appendChild(tr);
					});
				});
			}
			async function loadNoteData() {

				try {

					const response = await fetch("./note.json");

					if (!response.ok) {
						throw new Error("HTTP " + response.status);
					}

					noteData = await response.json();

					console.log(noteData);

					initNoteContainer();
					// 默认选择第一个
					if (noteData.length > 0) {
					    // 不给输入框赋值，只显示默认提醒
					    showNote();
					}

				} catch (e) {

					console.error(e);

					alert("读取 note.json 失败：" + e.message);

				}

			}

			function initNoteContainer() {

				const container = document.getElementById("noteContainer");

				container.innerHTML = `
			
			    <div style="
			        display:flex;
			        align-items:center;
			        width:100%;
			        margin:15px 0;
			        padding:10px;
			        background:#f4f4f4;
			        border-radius:8px;
			        box-sizing:border-box;
			    ">
			
			        <div style="position:relative;">
			
			            <input
			                id="noteInput"
			                placeholder="请选择船公司"
			                autocomplete="off"
			                style="
			                    width:220px;
			                    height:36px;
			                    padding:0 12px;
			                    box-sizing:border-box;
			                    border:1px solid #b7d8ff;
			                    border-radius:5px;
			                    background:#eef7ff;
			                    color:#333;
			                    font-size:14px;
			                    outline:none;
			                    transition:.2s;
			                "
			            >
			
			            <div
			                id="noteList"
			                style="
			                    display:none;
			                    position:absolute;
			                    left:0;
			                    top:40px;
			                    width:220px;
			                    max-height:250px;
			                    overflow-y:auto;
			                    background:#eef7ff;
			                    border:1px solid #b7d8ff;
			                    border-radius:5px;
			                    box-shadow:0 4px 12px rgba(0,0,0,.12);
			                    z-index:999;
			                ">
			            </div>
			
			        </div>
			
			        <div
			            id="noteText"
			            style="
			                display:flex;
			                overflow-x:auto;
			                white-space:nowrap;
			                margin-left:20px;
			                gap:10px;
			                flex:1;
			            ">
			        </div>
			
			    </div>
			    `;

				const input = document.getElementById("noteInput");

				input.addEventListener("click", function() {

					renderNoteList(true);

					setTimeout(() => this.select(), 0);

				});

				input.addEventListener("focus", function() {

					renderNoteList(true);

					setTimeout(() => this.select(), 0);

				});

				input.addEventListener("input", function() {

					renderNoteList(false);

					// 输入为空时立即恢复默认提醒
					if (this.value.trim() === "") {
						showNote();
					}

				});

			}

			function renderNoteList(showAll = false) {

				const keyword = showAll ?
					"" :
					document.getElementById("noteInput").value.toLowerCase();

				const list = document.getElementById("noteList");

				list.innerHTML = "";

				list.style.display = "block";

				noteData
					.slice(1)
					.filter(item => {

						if (showAll) return true;

						const txt =
							(item.name + " " + item["chinese-name"]).toLowerCase();

						return txt.includes(keyword);

					})
					.forEach(item => {


						const div = document.createElement("div");

						div.innerHTML = item.name + " " + item["chinese-name"];

						div.style.cssText = `
						    padding:8px 12px;
						    cursor:pointer;
						    border-radius:8px;
						    margin:4px;
						    transition:.15s;
						`;

						div.onmouseenter = () => {
						    div.style.background = "#cfe8ff";
						};
						
						div.onmouseleave = () => {
						    div.style.background = "transparent";
						};

						div.onclick = function() {

							document.getElementById("noteInput").value = this.innerHTML;

							list.style.display = "none";

							showNote();

						};

						list.appendChild(div);

					});

			}

			function showNote() {

				const value = document.getElementById("noteInput").value.trim();

				let obj;

				if (value === "") {

					obj = noteData[0];

				} else {

					obj = noteData.find(item =>
						value === item.name + " " + item["chinese-name"]
					);

				}

				const note = document.getElementById("noteText");

				note.innerHTML = "";

				if (!obj) return;

				Object.values(obj.text).forEach(text => {

					const div = document.createElement("div");

					div.className = "note-item";

					div.innerText = text;

					note.appendChild(div);

				});

			}



			// 回车触发查询
			document.getElementById('unNo').addEventListener('keydown', function(event) {
				if (event.key === "Enter") searchData();
			});

			// Un No 长度为4自动查询
			document.getElementById('unNo').addEventListener('input', function(event) {
				const val = event.target.value.trim();

				if (/^\d{4}$/.test(val)) {
					searchData();
				}
			});

			// === 货物体积计算模块（仅优化增加/删除不影响已有数据） ===
			let cargoCount = 5;
			const cargoContainer = document.getElementById('cargoContainer');
			let cargoData = []; // 保存重量和体积

			function createCargoInput(index) {
				const weight = cargoData[index]?.weight || '';
				const volume = cargoData[index]?.volume || '';
				const label = document.createElement('label');
				label.style.marginRight = '10px';
				label.innerHTML = `货物${index+1}: <input type="text" class="cargoWeight" style="width:50px;" value="${weight}" placeholder="重量"> 
                       <span class="red-volume">${volume}</span>`;
				return label;
			}

			function renderCargoInputs() {
				// 保存总输入数据
				const totalVolumeInput = document.getElementById('totalVolume');
				const totalVolume = totalVolumeInput ? totalVolumeInput.value : '';

				cargoContainer.innerHTML = `
				<label style="margin-right:10px;">
				    柜型:
				    <select id="containerType" style="
				        width:120px;
				        height:26px;
				        padding:2px 4px;
				        border:1px solid #ccc;
				        border-radius:2px;
				        vertical-align:middle;
				    ">
				        <option value="">手动填写</option>
				        <option value="26">20GP / 26CBM</option>
				        <option value="50">40GP / 50CBM</option>
				        <option value="60">40HQ / 60CBM</option>
				    </select>
				</label>
				
				<label style="margin-right:10px;">
				    总体积:
				    <input type="text" id="totalVolume" placeholder="总体积" style="
				        width:60px;
				        height:26px;
				        padding:2px 4px;
				        border:1px solid #ccc;
				        border-radius:2px;
				        vertical-align:middle;
				    " value="${totalVolume}">
				</label>
				`;

				for (let i = 0; i < cargoCount; i++) {
					if (!cargoData[i]) cargoData[i] = {
						weight: '',
						volume: ''
					};
					const label = createCargoInput(i);
					cargoContainer.appendChild(label);
				}

				bindCargoEvents();
			}

			function bindCargoEvents() {

				const totalVolumeInput = document.getElementById('totalVolume');

				// 新增：柜型选择
				const containerType = document.getElementById('containerType');

				const cargoWeights = Array.from(
					cargoContainer.querySelectorAll('.cargoWeight')
				);

				const volSpans = Array.from(
					cargoContainer.querySelectorAll('.red-volume')
				);

				// 体积计算
				function calculateVolumes() {

					const totalVolume =
						parseFloat(totalVolumeInput.value) || 0;

					const weights = cargoWeights.map(
						input => parseFloat(input.value) || 0
					);

					const totalWeight =
						weights.reduce((a, b) => a + b, 0);

					weights.forEach((w, i) => {

						if (totalVolume > 0 && totalWeight > 0) {

							const actualVolume =
								(w / totalWeight) * totalVolume;

							volSpans[i].innerText =
								actualVolume.toFixed(2);

							cargoData[i].weight =
								cargoWeights[i].value;

							cargoData[i].volume =
								actualVolume.toFixed(2);

						} else {

							volSpans[i].innerText = '';

							cargoData[i].weight =
								cargoWeights[i].value;

							cargoData[i].volume = '';
						}
					});
				}

				// 总体积手动输入
				totalVolumeInput.addEventListener(
					'input',
					calculateVolumes
				);

				// 重量输入
				cargoWeights.forEach(input => {

					input.addEventListener(
						'input',
						calculateVolumes
					);
				});

				// 新增：柜型选择自动填充体积
				if (containerType) {

					containerType.addEventListener('change', function() {

						if (this.value) {

							totalVolumeInput.value = this.value;

						} else {

							// 选择“手动填写”时清空
							totalVolumeInput.value = '';
						}

						calculateVolumes();
					});
				}

				calculateVolumes();
			}

			// 初始化
			for (let i = 0; i < cargoCount; i++) cargoData.push({
				weight: '',
				volume: ''
			});
			renderCargoInputs();

			// 同步卡片数量
			function syncPackageCalculators() {

				const wrapper = document.getElementById(
					'packageCalculatorWrapper'
				);

				// 当前卡片数量
				let currentCount =
					wrapper.querySelectorAll('.package-calculator').length;

				// 增加卡片
				while (currentCount < cargoCount) {

					const div = document.createElement('div');

					div.className = 'package-calculator';

					wrapper.appendChild(div);

					// 创建新卡片
					createPackageCalculator(div);

					currentCount++;
				}

				// 删除卡片
				while (currentCount > cargoCount) {

					wrapper.lastElementChild.remove();

					currentCount--;
				}
			}

			// 增加
			document.getElementById('addCargo').addEventListener('click', () => {

				cargoCount++;

				cargoData.push({
					weight: '',
					volume: ''
				});

				renderCargoInputs();

				syncPackageCalculators();
			});

			// 删除
			document.getElementById('removeCargo').addEventListener('click', () => {

				if (cargoCount > 1) {

					cargoCount--;

					cargoData.pop();

					renderCargoInputs();

					syncPackageCalculators();
				}
			});
			initNoteContainer();

			document.addEventListener("click", function(e) {

				const input = document.getElementById("noteInput");

				const list = document.getElementById("noteList");

				if (
					input &&
					list &&
					e.target !== input &&
					!list.contains(e.target)
				) {

					list.style.display = "none";

				}

			});
			loadNoteData();
		</script>

	</body>
</html>
